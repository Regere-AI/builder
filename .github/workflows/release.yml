# Build and publish Builder (Tauri) with updater support.
# On push to `release`, creates a GitHub Release with installers and latest.json for the in-app updater.
# See docs/UPDATER.md for required repo secrets and tauri.conf.json endpoint URL.

name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        # Use npm install so optional deps (e.g. tree-sitter from swagger-ui-react) resolve
        # when lock file was generated with a different npm version; npm ci can fail with
        # "Missing: tree-sitter@... from lock file" in that case.
        run: npm install

      - name: Build and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: Builder-v__VERSION__
          releaseName: "Builder v__VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # Merge latest.json so it includes all platforms (darwin + windows).
  # Without this, whichever matrix job finishes last overwrites latest.json with only its platform,
  # so e.g. macOS "Check for Updates" fails when the release only has windows-x86_64 in latest.json.
  merge-latest-json:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: publish-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge latest.json for all platforms
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG="Builder-v$VERSION"
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          node .github/scripts/merge-updater-latest.cjs "$OWNER" "$REPO" "$TAG" "$GITHUB_TOKEN"
